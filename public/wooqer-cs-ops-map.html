<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Interactive CS Ops / Program Manager Org Map</title>
<style>
:root {
  --bg: #080b10;
  --panel: #0d131e;
  --panel-2: #111a29;
  --panel-3: #152135;
  --text: #f7f9fc;
  --muted: #9ca8bb;
  --muted-2: #718095;
  --border: #2a374c;
  --border-strong: #4a5d79;
  --blue: #58aaff;
  --blue-soft: rgba(88,170,255,.13);
  --orange: #ffb356;
  --orange-soft: rgba(255,179,86,.15);
  --green: #a9dca2;
  --green-soft: rgba(169,220,162,.16);
  --focus: #a6d7ff;
  --shadow: 0 22px 60px rgba(0,0,0,.38);
  --shadow-soft: 0 12px 28px rgba(0,0,0,.26);
  --radius-lg: 28px;
  --radius-md: 20px;
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  color: var(--text);
  background: radial-gradient(circle at 28% 0%, #172033 0, #080b10 42%, #06080d 100%);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  overflow: hidden;
}
button, input { font: inherit; }
button:focus-visible, input:focus-visible, a:focus-visible, .node:focus-visible, .project-card:focus-visible {
  outline: 3px solid var(--focus);
  outline-offset: 3px;
}
.app { height: 100%; display: flex; flex-direction: column; }
.toolbar {
  position: relative;
  z-index: 30;
  display: grid;
  grid-template-columns: auto minmax(280px, 470px) auto auto;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  background: rgba(8, 11, 16, .88);
  border-bottom: 1px solid rgba(255,255,255,.08);
  backdrop-filter: blur(18px);
  box-shadow: 0 10px 34px rgba(0,0,0,.24);
}
.brand { display: flex; align-items: center; gap: 12px; min-width: 220px; }
.brand-mark { width: 36px; height: 36px; border-radius: 13px; background: linear-gradient(135deg, var(--green), var(--blue)); box-shadow: 0 0 0 6px rgba(255,255,255,.035); }
.brand h1 { font-size: 16px; line-height: 1.1; margin: 0; letter-spacing: -.015em; }
.brand span { display: block; font-size: 12px; color: var(--muted); margin-top: 3px; }
.search-wrap { position: relative; }
.search-wrap input {
  width: 100%; height: 44px; border: 1px solid var(--border); border-radius: 15px;
  background: #101724; color: var(--text); padding: 0 72px 0 40px; outline: none;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
}
.search-icon { position: absolute; left: 14px; top: 10px; color: var(--muted); font-size: 18px; }
.result-badge { position: absolute; right: 8px; top: 8px; min-width: 58px; text-align: center; border-radius: 999px; background: #1b2638; color: var(--muted); font-size: 12px; padding: 5px 8px; }
.control-group { display: flex; align-items: center; gap: 8px; padding: 4px; border-radius: 16px; background: rgba(255,255,255,.035); border: 1px solid rgba(255,255,255,.06); }
.btn {
  height: 36px; border: 1px solid transparent; border-radius: 12px; color: var(--text); background: #182338;
  padding: 0 12px; display: inline-flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer;
  transition: transform .15s ease, background .15s ease, border-color .15s ease;
}
.btn:hover { transform: translateY(-1px); background: #23314b; border-color: #43536e; }
.btn.primary { background: var(--blue-soft); border-color: rgba(88,170,255,.32); }
.btn.icon { width: 36px; padding: 0; font-size: 20px; }
.zoom-label { min-width: 48px; text-align: center; color: var(--muted); font-size: 13px; font-variant-numeric: tabular-nums; }
.chips { display: flex; align-items: center; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
.chip {
  height: 36px; border-radius: 999px; border: 1px solid var(--border); background: #111928; color: var(--muted);
  padding: 0 13px; cursor: pointer; transition: .15s;
}
.chip:hover { color: var(--text); border-color: var(--border-strong); }
.chip.active { color: var(--text); background: var(--blue-soft); border-color: rgba(88,170,255,.45); }
.main { position: relative; flex: 1; min-height: 0; }
.stage { position: absolute; inset: 0; overflow: auto; cursor: grab; scroll-behavior: smooth; }
.stage.dragging { cursor: grabbing; user-select: none; }
.canvas { position: relative; width: 2340px; height: 850px; transform-origin: 0 0; transition: transform .16s ease, height .22s ease; overflow: visible; }
.grid-bg {
  position: absolute; inset: 0;
  background-image: linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px);
  background-size: 40px 40px;
  mask-image: radial-gradient(circle at 48% 35%, black 0, black 60%, transparent 96%);
}
.zone { position: absolute; border-radius: 34px; background: rgba(255,255,255,.012); border: 1px solid rgba(255,255,255,.03); pointer-events: none; }
.zone-program { left: 40px; top: 235px; width: 560px; height: 430px; }
.zone-direct { left: 600px; top: 190px; width: 1320px; height: 480px; }
.zone-finance { left: 1995px; top: 28px; width: 320px; height: 680px; }
.connector-layer { position: absolute; inset: 0; width: 2340px; height: 1320px; overflow: visible; pointer-events: none; z-index: 2; }
.connector { fill: none; stroke-width: 2.6; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; opacity: .74; }
.connector.gray { stroke: #93a0b3; opacity: .42; }
.connector.blue { stroke: var(--blue); }
.connector.orange { stroke: var(--orange); }
.connector-label rect { rx: 12; ry: 12; fill: rgba(8,11,16,.92); stroke: rgba(255,255,255,.12); }
.connector-label text { fill: #f4f7fb; font-size: 15px; font-weight: 850; letter-spacing: -.01em; dominant-baseline: middle; }
.node-layer, .project-layer { position: absolute; inset: 0; z-index: 5; }
.node {
  position: absolute; min-width: 200px; min-height: 74px; padding: 13px 16px; border-radius: 20px;
  border: 1px solid var(--border); background: linear-gradient(180deg, var(--panel-2), var(--panel));
  box-shadow: var(--shadow-soft); color: var(--text); display: flex; align-items: center; justify-content: center; gap: 10px;
  text-align: center; line-height: 1.15; font-size: 16.5px; font-weight: 850; letter-spacing: -.012em; cursor: pointer;
  transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease, opacity .16s ease;
}
.node:hover { transform: translateY(-3px); border-color: #64748d; box-shadow: var(--shadow); }
.node.dim, .project-card.dim { opacity: .52; }
.node.muted, .project-card.muted { opacity: .36; }
.node-icon { width: 38px; height: 38px; border-radius: 13px; display: grid; place-items: center; background: rgba(255,255,255,.08); font-size: 20px; flex: 0 0 auto; }
.node-label { min-width: 0; }
.node.top { font-size: 15.5px; min-height: 68px; }
.node.leader { color: #eaf8e8; background: linear-gradient(180deg, rgba(35,61,34,.98), rgba(18,31,21,.98)); border-color: rgba(169,220,162,.42); box-shadow: 0 16px 46px rgba(0,0,0,.32), 0 0 0 5px rgba(169,220,162,.07); font-size: 17px; }
.node.finance { font-size: 15.5px; }
.manager-card {
  position: absolute; display: grid; grid-template-columns: 92px minmax(0, 1fr); align-items: center; column-gap: 20px;
  padding: 20px 24px; border-radius: 28px; width: 560px; height: 170px; overflow: hidden; cursor: pointer; z-index: 6;
  background: linear-gradient(180deg, rgba(22,34,54,.98), rgba(12,19,31,.98));
  border: 1.5px solid rgba(134,183,255,.44);
  box-shadow: 0 24px 70px rgba(0,0,0,.40), 0 0 0 1px rgba(255,255,255,.04) inset, 0 0 46px rgba(169,220,162,.10);
  transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
}
.manager-card:hover { transform: translateY(-3px); border-color: rgba(134,183,255,.7); box-shadow: 0 30px 80px rgba(0,0,0,.48), 0 0 52px rgba(88,170,255,.13); }
.manager-photo { width: 92px; height: 92px; border-radius: 24px; object-fit: cover; object-position: center; border: 3px solid rgba(255,255,255,.9); box-shadow: 0 12px 28px rgba(0,0,0,.36); }
.manager-content { min-width: 0; overflow: hidden; display: flex; flex-direction: column; justify-content: center; gap: 5px; }
.manager-kicker { display: none; }
.manager-title { font-size: 26px; line-height: 1.08; color: #fff; font-weight: 950; letter-spacing: -.035em; max-width: 100%; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.manager-name { font-size: 18px; line-height: 1.15; color: #baf2b1; font-weight: 900; margin-top: 2px; }
.linkedin-button {
  width: max-content; display: inline-flex; align-items: center; gap: 7px; margin-top: 4px; color: #d7ecff; text-decoration: none;
  background: rgba(88,170,255,.16); border: 1px solid rgba(88,170,255,.38); border-radius: 999px; padding: 7px 12px;
  font-size: 14px; line-height: 1; font-weight: 900; transition: .15s;
}
.linkedin-button:hover { background: rgba(88,170,255,.26); border-color: rgba(88,170,255,.58); color: #fff; }
.linkedin-in { display: inline-grid; place-items: center; width: 17px; height: 17px; border-radius: 5px; background: #0a66c2; color: white; font-size: 12px; font-weight: 950; }
.project-card {
  position: absolute; width: 270px; min-height: 104px; border-radius: 22px; border: 1px solid var(--border);
  background: linear-gradient(180deg, #142034, #0e1521); box-shadow: var(--shadow-soft);
  display: block; cursor: pointer; overflow: hidden;
  transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease, opacity .16s ease, background .16s ease, max-height .28s ease;
  max-height: 104px;
}
.project-card:hover { transform: translateY(-3px); border-color: #64748d; box-shadow: var(--shadow); }
.project-card.active, .project-card.expanded { border-color: var(--blue); box-shadow: 0 0 0 5px rgba(88,170,255,.14), var(--shadow); }
.project-summary { display: flex; align-items: center; gap: 14px; min-height: 104px; padding: 16px; }
.project-icon { width: 48px; height: 48px; border-radius: 16px; display: grid; place-items: center; background: rgba(88,170,255,.12); border: 1px solid rgba(88,170,255,.20); font-size: 24px; flex: 0 0 auto; }
.project-info { min-width: 0; flex: 1; }
.project-info h3 { margin: 0; font-size: 19px; line-height: 1.12; letter-spacing: -.018em; font-weight: 900; overflow-wrap: anywhere; }
.project-info span { display: block; margin-top: 7px; font-size: 14px; line-height: 1.1; color: var(--muted); font-weight: 750; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.project-action { width: 38px; height: 38px; border: 0; border-radius: 14px; background: rgba(255,255,255,.045); color: var(--muted); display: grid; place-items: center; font-size: 24px; flex: 0 0 auto; cursor: pointer; transition: transform .2s ease, background .15s ease, color .15s ease; }
.project-card:hover .project-action, .project-card.active .project-action, .project-card.expanded .project-action { color: #fff; background: rgba(88,170,255,.16); }
.project-card.expanded { max-height: 680px; background: linear-gradient(180deg, #15243a, #0e1521); }
.project-card.expanded .project-action { transform: rotate(90deg); }
.project-details { max-height: 0; opacity: 0; margin: 0; padding: 0 18px; list-style: none; overflow: hidden; transition: max-height .30s ease, opacity .20s ease, padding .30s ease; border-top: 1px solid rgba(255,255,255,.08); }
.project-card.expanded .project-details { max-height: 560px; opacity: 1; padding: 16px 18px 20px; }
.project-details li { display: grid; grid-template-columns: 30px 1fr; gap: 10px; align-items: start; color: #e4ebf6; font-size: 15.8px; line-height: 1.42; margin-bottom: 10px; }
.item-emoji { display: grid; place-items: center; width: 24px; height: 24px; border-radius: 999px; background: rgba(255,255,255,.07); font-size: 15px; line-height: 1; }
.project-details li:last-child { margin-bottom: 0; }
.project-panel-button { display: none; }
.toast { position: fixed; left: 18px; bottom: 18px; z-index: 60; display: none; max-width: min(460px, calc(100vw - 36px)); background: #141d2c; border: 1px solid var(--border); border-radius: 15px; padding: 12px 14px; color: var(--muted); box-shadow: var(--shadow-soft); }
.toast.show { display: block; }
mark { background: #fff1a3; color: #111; border-radius: 4px; padding: 0 2px; }
.mobile-tip, .accordion { display: none; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
@media (max-width: 1180px) {
  .toolbar { grid-template-columns: 1fr; align-items: stretch; }
  .control-group, .chips { overflow: auto; justify-content: flex-start; }
}
@media (max-width: 820px) {
  body { overflow: auto; }
  .app { height: auto; min-height: 100%; }
  .toolbar { position: sticky; top: 0; }
  .main { height: auto; }
  .stage { display: none; }
  .mobile-tip { display: block; padding: 10px 14px; color: var(--muted); background: #101722; border-bottom: 1px solid var(--border); font-size: 13px; }
  .accordion { display: block; padding: 14px; }
  .acc-section { border: 1px solid var(--border); background: #101722; border-radius: 18px; margin-bottom: 12px; overflow: hidden; }
  .acc-title { width: 100%; text-align: left; background: #151f30; color: var(--text); border: 0; padding: 16px; font-weight: 850; display: flex; justify-content: space-between; gap: 12px; }
  .acc-body { padding: 0 16px 16px; color: #dce3ef; }
  .acc-body ol { margin-bottom: 0; padding-left: 20px; }
}
</style>
</head>
<body>
<div class="app">
  <header class="toolbar" aria-label="Map controls">
    <div class="brand"><div class="brand-mark" aria-hidden="true"></div><div><h1>CS Ops / Program Manager Map</h1><span>Interactive ownership flow</span></div></div>
    <div class="search-wrap"><span class="search-icon" aria-hidden="true">⌕</span><label class="sr-only" for="search">Search map</label><input id="search" autocomplete="off" placeholder="Search teams, projects, dashboards..." /><span id="resultBadge" class="result-badge">All</span></div>
    <div class="control-group" aria-label="View controls">
      <button class="btn icon" id="zoomOut" title="Zoom out" aria-label="Zoom out">−</button>
      <span class="zoom-label" id="zoomLabel">100%</span>
      <button class="btn icon" id="zoomIn" title="Zoom in" aria-label="Zoom in">+</button>
      <button class="btn primary" id="fit" title="Fit overview on screen">Fit view</button>
      <button class="btn" id="reset" title="Reset search, filters, selected card, and zoom">Reset</button>
    </div>
    <nav class="chips" aria-label="Filter map">
      <button class="chip active" data-filter="all">All</button>
      <button class="chip" data-filter="retention">Retention</button>
      <button class="chip" data-filter="growth">Growth</button>
      <button class="chip" data-filter="support">Support</button>
      <button class="chip" data-filter="onboarding">Onboarding</button>
      <button class="chip" data-filter="revops">RevOps</button>
    </nav>
  </header>
  <div class="mobile-tip">Mobile view switches to a simple accordion. Use desktop for the full visual ownership map.</div>
  <main class="main">
    <section class="stage" id="stage" aria-label="Interactive organization map">
      <div class="canvas" id="canvas">
        <div class="grid-bg"></div>
        <div class="zone zone-program"></div>
        <div class="zone zone-direct"></div>
        <div class="zone zone-finance"></div>
        <svg class="connector-layer" id="connectorLayer" viewBox="0 0 2340 1320" aria-hidden="true"></svg>
        <div class="node-layer" id="nodeLayer"></div>
        <div class="project-layer" id="projectLayer"></div>
      </div>
    </section>
    <section class="accordion" id="accordion" aria-label="Mobile organization map"></section>
  </main>
</div>

<div class="toast" id="toast"></div>

function byId(id) { return nodes.find(n => n.id === id); }

function emojiForItem(item) {
  const t = String(item).toLowerCase();

  if (t.includes('churn') || t.includes('risk') || t.includes('retention')) return '🛡️';
  if (t.includes('nps') || t.includes('review') || t.includes('csat')) return '⭐';
  if (t.includes('playbook') || t.includes('repository') || t.includes('knowledge')) return '📘';
  if (t.includes('billing') || t.includes('revenue') || t.includes('collections') || t.includes('payment') || t.includes('mrr')) return '💰';
  if (t.includes('onboarding') || t.includes('setup') || t.includes('implementation')) return '🚀';
  if (t.includes('training') || t.includes('certification') || t.includes('enablement')) return '🎓';
  if (t.includes('newsletter') || t.includes('communication') || t.includes('festival') || t.includes('birthday')) return '📣';
  if (t.includes('handoff') || t.includes('readiness') || t.includes('blocker')) return '🧩';

function getBox(id) {
  const n = byId(id);
  if (n) return { x:n.x, y:n.y, width:n.width, height:n.height };
  const pos = projectPositions[id];
  return pos ? { x:pos.x, y:pos.y, width:pos.width, height:pos.height } : null;
}
function anchor(box, pos) {
  const x = box.x, y = box.y, w = box.width, h = box.height;
  return {
    top: { x: x + w/2, y }, bottom: { x: x + w/2, y: y + h }, left: { x, y: y + h/2 }, right: { x: x + w, y: y + h/2 }
  }[pos];
}
function createSvg(tag, attrs = {}) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v));
  return el;
}
function pathEl(d, type) {
  const p = createSvg('path', { d, class: `connector ${type}` });
  svg.appendChild(p);
}
function drawLabel(text, x, y) {
  const group = createSvg('g', { class: 'connector-label' });
  const approxWidth = Math.max(142, text.length * 9.2 + 28);
  const rect = createSvg('rect', { x: x - approxWidth/2, y: y - 19, width: approxWidth, height: 38 });
  const label = createSvg('text', { x, y, 'text-anchor': 'middle' });
  label.textContent = text;
  group.appendChild(rect); group.appendChild(label); svg.appendChild(group);
}
function drawElbow(start, end, type, direction = 'vertical') {
  if (direction === 'horizontal') {
    // Clean program-ownership path: exit horizontally from the manager card,
    // then drop vertically into the department. No backward/right detours.
    pathEl(`M ${start.x} ${start.y} L ${end.x} ${start.y} L ${end.x} ${end.y}`, type);
    return;
  }
  const midY = Math.round((start.y + end.y) / 2);
  pathEl(`M ${start.x} ${start.y} L ${start.x} ${midY} L ${end.x} ${midY} L ${end.x} ${end.y}`, type);
}
function drawBus(fromId, toIds, type) {
  const from = anchor(getBox(fromId), 'bottom');
  const targets = toIds.map(id => anchor(getBox(id), 'top'));
  const busY = 420;
  const minX = Math.min(...targets.map(t => t.x), from.x);
  const maxX = Math.max(...targets.map(t => t.x), from.x);
  pathEl(`M ${from.x} ${from.y} L ${from.x} ${busY}`, type);
  pathEl(`M ${minX} ${busY} L ${maxX} ${busY}`, type);
  targets.forEach(t => pathEl(`M ${t.x} ${busY} L ${t.x} ${t.y}`, type));
}
function drawProjectConnector(parentId, projectId, type) {
  const start = anchor(getBox(parentId), 'bottom');
  const end = anchor(getBox(projectId), 'top');
  const midY = 585;
  // Soft elbow keeps the visual hierarchy readable without weird diagonal bends.
  pathEl(`M ${start.x} ${start.y} C ${start.x} ${midY}, ${start.x} ${midY}, ${(start.x + end.x)/2} ${midY} S ${end.x} ${midY}, ${end.x} ${end.y}`, type);
}
function drawConnectors() {
  svg.innerHTML = '';

    if (Array.isArray(c.to)) drawBus(c.from, c.to, c.type);
    else {
      const start = anchor(getBox(c.from), c.fromAnchor || 'bottom');
      const end = anchor(getBox(c.to), c.toAnchor || 'top');
      drawElbow(start, end, c.type, c.fromAnchor === 'left' ? 'horizontal' : 'vertical');
    }
    if (c.label) drawLabel(c.label, c.labelAt.x, c.labelAt.y);

function openNodeToast(n) {
  const msg = n.kind === 'finance' ? 'Finance Leadership connects into Revenue Systems and RevOps projects.' : n.kind === 'leader' ? 'CS and Sales Leader sits between the CS organization and the Program Manager role.' : n.kind === 'top' ? 'Top-level Customer Success Organization.' : `${n.label.replace(/\n/g, ' ')} team area.`;
  showToast(msg);
}
function syncProjectDetailsText() {
  const query = searchInput.value.trim();
  document.querySelectorAll('.project-card').forEach(card => {
    const p = projectById(card.dataset.projectId);
    const list = card.querySelector('.project-details');
    if (!p || !list) return;
    list.innerHTML = `${p.items.map((item) => `<li><span class="item-emoji">${emojiForItem(item)}</span><span>${highlightText(item, query)}</span></li>`).join('')}`;
  });

function updateCanvasHeight() {
  const baseH = expandedProjectId ? EXPANDED_H : COLLAPSED_H;
  canvas.style.height = (baseH * zoom) + 'px';
}
function toggleProject(projectId) {
  const nextId = expandedProjectId === projectId ? null : projectId;
  expandedProjectId = nextId;
  syncProjectDetailsText();
  document.querySelectorAll('.project-card').forEach(card => {
    const isExpanded = card.dataset.projectId === expandedProjectId;
    card.classList.toggle('expanded', isExpanded);
    card.classList.toggle('active', isExpanded);
    card.setAttribute('aria-expanded', String(isExpanded));
    card.setAttribute('aria-label', `${isExpanded ? 'Collapse' : 'Expand'} ${projectById(card.dataset.projectId)?.title || 'project'}`);
  });
  updateCanvasHeight();
  if (expandedProjectId) {
    const card = document.querySelector(`[data-project-id="${expandedProjectId}"]`);

function highlightText(text, query) {
  if (!query) return escapeHtml(text);
  const safe = escapeHtml(text);
  const esc = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return safe.replace(new RegExp(esc, 'ig'), m => `<mark>${m}</mark>`);
}
function escapeHtml(str) { return String(str).replace(/[&<>"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s])); }
function showToast(msg) {
  toast.textContent = msg; toast.classList.add('show');
  clearTimeout(showToast.t); showToast.t = setTimeout(() => toast.classList.remove('show'), 2400);
}
function setZoom(z) {
  zoom = Math.max(.58, Math.min(1.16, z));

  canvas.style.width = (CONTENT_W * zoom) + 'px';

  document.getElementById('zoomLabel').textContent = Math.round(zoom * 100) + '%';
}
function fitView() {
  const pad = 42;
  const availableW = stage.clientWidth - pad;
  const availableH = stage.clientHeight - pad;
  const contentW = CONTENT_W;
  const contentH = COLLAPSED_H;
  const z = Math.min(1, Math.max(.62, Math.min(availableW / contentW, availableH / contentH)));
  setZoom(z);
  requestAnimationFrame(() => {
    stage.scrollLeft = Math.max(0, (contentW * zoom - stage.clientWidth) / 2);
    stage.scrollTop = 0;
  });

function applySearchAndFilter() {
  const query = searchInput.value.trim().toLowerCase();
  let matchCount = 0;
  const visibleProjectIds = new Set();
  projects.forEach(p => {
    const text = `${p.title} ${p.category} ${p.owner} ${p.items.join(' ')}`.toLowerCase();
    const filterMatch = activeFilter === 'all' || p.category === activeFilter || (activeFilter === 'growth' && p.id === 'growth') || (activeFilter === 'support' && p.category === 'support') || (activeFilter === 'revops' && p.category === 'revops') || (activeFilter === 'onboarding' && p.category === 'onboarding');
    const searchMatch = !query || text.includes(query);
    const card = document.querySelector(`[data-project-id="${p.id}"]`);
    card.classList.toggle('muted', !filterMatch || !searchMatch);
    if (filterMatch && searchMatch) { matchCount++; visibleProjectIds.add(p.id); }
  });
  nodes.forEach(n => {
    const el = document.querySelector(`[data-node-id="${n.id}"]`);
    if (!el) return;
    if (activeFilter === 'all' && !query) { el.classList.remove('muted'); return; }
    const related = projects.some(p => visibleProjectIds.has(p.id) && p.parent === n.id);
    const nodeText = `${n.label || n.title || ''} ${n.owner || ''}`.toLowerCase();
    const ownMatch = !query || nodeText.includes(query);
    const filterRelevant = activeFilter === 'all' || related || (n.tags || []).includes(activeFilter) || n.id === 'program-manager' || n.id === 'cs-sales-leader' || n.id === 'cs-org';
    el.classList.toggle('muted', !(filterRelevant && (ownMatch || related || !query)));
  });
  resultBadge.textContent = query || activeFilter !== 'all' ? `${matchCount} found` : 'All';
  if ((query || activeFilter !== 'all') && matchCount === 0) showToast('No matching projects found.');
  syncProjectDetailsText();
}
function initDrag() {
  let down = false, startX = 0, startY = 0, scrollLeft = 0, scrollTop = 0;
  stage.addEventListener('mousedown', e => {
    if (e.target.closest('button,input,a,.project-card,.node,.manager-card')) return;
    down = true; stage.classList.add('dragging'); startX = e.pageX; startY = e.pageY; scrollLeft = stage.scrollLeft; scrollTop = stage.scrollTop;
  });
  window.addEventListener('mouseup', () => { down = false; stage.classList.remove('dragging'); });
  stage.addEventListener('mousemove', e => {
    if (!down) return; e.preventDefault();
    stage.scrollLeft = scrollLeft - (e.pageX - startX);
    stage.scrollTop = scrollTop - (e.pageY - startY);
  });
}
function initEvents() {

    activeFilter = ch.dataset.filter;
    document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c === ch));
    applySearchAndFilter();
  }));
  searchInput.addEventListener('input', applySearchAndFilter);
  window.addEventListener('keydown', e => { if (e.key === 'Escape' && expandedProjectId) toggleProject(expandedProjectId); });
  window.addEventListener('resize', () => { drawConnectors(); });
}
function boot() {
  renderNodes(); renderProjects(); renderAccordion(); drawConnectors(); initEvents(); initDrag(); updateCanvasHeight(); fitView(); applySearchAndFilter();
}
boot();
